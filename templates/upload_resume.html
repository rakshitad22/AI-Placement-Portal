{% load static %}

<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

```
<title>Upload Resume</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{% static 'css/style.css' %}">
```

</head>

<body>

<div class="container">

```
<div class="row justify-content-center align-items-center"
     style="min-height:100vh;">

    <div class="col-md-7">

        <div class="glass-card">

            <h2 class="text-center mb-4">
                📄 Upload Your Resume
            </h2>

            <p class="text-center text-light mb-4">
                Upload your latest resume and get ATS insights.
            </p>

            <form method="POST"
                  enctype="multipart/form-data">

                {% csrf_token %}

                <div class="mb-4">

                    <label class="form-label">
                        Full Name
                    </label>

                    <input type="text"
                           name="name"
                           class="form-control"
                           placeholder="Enter your name"
                           required>

                </div>

                <div class="mb-4">

                    <label class="form-label">
                        Upload Resume (PDF)
                    </label>

                    <input type="file"
                           name="resume"
                           class="form-control"
                           required>

                </div>

                <div class="d-grid">

                    <button type="submit"
                            class="btn custom-btn">

                        Upload Resume 🚀

                    </button>

                </div>

            </form>

            <hr>

            <div class="text-center">

                <a href="/resume/ats/"
                   class="btn btn-outline-light">

                    View ATS Analysis

                </a>

            </div>

        </div>

    </div>

</div>
```

</div>

<footer class="footer">

```
<h5>
    Designed & Developed by Rakshita D ✨
</h5>

<p>
    Transforming Placement Preparation with AI 🚀
</p>

<small>
    © 2026 AI Placement Portal | All Rights Reserved
</small>
```

</footer>

</body>

</html>
